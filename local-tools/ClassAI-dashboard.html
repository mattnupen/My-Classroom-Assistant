<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* ---- Ocean Depths (the project's own theme, applied to its home base) ---- */
  :root {
    --cream:      #f1faee;  /* brand background */
    --ink:        #0d1b2a;  /* primary text */
    --navy:       #1a2332;  /* title bands, hero */
    --navy-2:     #143a45;  /* hero gradient end (navy → teal-navy) */
    --teal:       #1f6b6b;  /* text-safe accent: links, progress, key terms */
    --teal-soft:  #2d8b8b;  /* decoration only */
    --seafoam:    #a8dadc;  /* fills behind ink text */
    --seafoam-pale:#e3f1ef; /* pale fill / chips */
    --gold:       #b9822b;  /* warning tone (decorative) */

    --bg:         #eef4f1;  /* app canvas (a hair cooler than cream for depth) */
    --card-bg:    #ffffff;
    --line:       #d8e6e1;
    --muted:      #51646d;  /* 4.7:1 on white — AA */
    --radius:     14px;
    --radius-sm:  9px;
    --shadow:     0 1px 2px rgba(13,27,42,.04), 0 6px 18px rgba(13,27,42,.06);
    --shadow-lift:0 4px 10px rgba(13,27,42,.07), 0 14px 34px rgba(13,27,42,.10);
    --space:      16px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* Main area (sidebar comes from _nav.js, which sets body { margin-left: 220px }) */
  .main { padding: 26px 30px 48px; max-width: 1180px; }

  /* Error banner */
  .error-banner {
    background: #fbeaea; border: 1px solid #f0c4c4; color: #8a2b2b;
    padding: 10px 14px; border-radius: var(--radius-sm);
    margin-bottom: 18px; font-size: 15px;
  }
  .error-banner:empty { display: none; }

  /* ---- Hero band ---- */
  .hero {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
    color: var(--cream);
    border-radius: 18px;
    padding: 26px 28px;
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    box-shadow: var(--shadow);
  }
  /* faint decorative wave for depth */
  .hero::after {
    content: ""; position: absolute; right: -40px; bottom: -70px;
    width: 320px; height: 320px; border-radius: 50%;
    background: radial-gradient(circle at center, rgba(168,218,220,.16), rgba(168,218,220,0) 68%);
    pointer-events: none;
  }
  .hero-mark { flex-shrink: 0; width: 58px; height: 58px; position: relative; z-index: 1; }
  .hero-text { flex: 1 1 320px; min-width: 0; position: relative; z-index: 1; }
  .hero-eyebrow {
    font-size: 13px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--seafoam); font-weight: 700; margin-bottom: 6px;
  }
  .hero h1 { margin: 0; font-size: 27px; font-weight: 700; line-height: 1.2; color: var(--cream); }
  .hero .hero-sub { margin-top: 7px; font-size: 16px; color: rgba(241,250,238,.82); max-width: 62ch; }
  .hero-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; position: relative; z-index: 1; }
  .hero-hint { font-size: 14px; color: rgba(241,250,238,.7); text-align: right; max-width: 22ch; }

  /* hero demo button (overrides the _nav.js .demo-btn just on the hero) */
  .hero .demo-btn {
    margin: 0; padding: 10px 18px; border-radius: 999px;
    background: var(--cream); color: var(--navy); border: 1px solid var(--cream);
    font-size: 15.5px; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 2px 10px rgba(0,0,0,.16); transition: transform .15s ease, box-shadow .15s ease;
  }
  .hero .demo-btn:hover { background: var(--seafoam); border-color: var(--seafoam); color: var(--navy); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.22); }
  .hero .demo-btn.is-on { background: transparent; color: var(--cream); border-color: rgba(241,250,238,.5); box-shadow: none; }
  .hero .demo-btn.is-on:hover { background: rgba(241,250,238,.12); }

  /* tier snapshot chips (rendered in demo hero when present) */
  .hero-chips { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(241,250,238,.10); border: 1px solid rgba(241,250,238,.18);
    color: var(--cream); border-radius: 999px; padding: 5px 12px; font-size: 14.5px; font-weight: 600;
  }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .chip .dot.s-strong { background: #7fd4c4; }
  .chip .dot.s-steady { background: var(--seafoam); }
  .chip .dot.s-strug  { background: #f0a868; }

  /* ---- Bento grid ---- */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: minmax(122px, auto);
    grid-auto-flow: dense;
    gap: var(--space);
  }
  .grid .empty-state {
    grid-column: 1 / -1; text-align: center; color: var(--muted);
    padding: 60px 20px; border: 1px dashed var(--line);
    border-radius: var(--radius); background: var(--card-bg);
  }

  /* ---- Cards ---- */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 17px 19px;
    display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); border-color: #c5dcd5; }

  .card .card-head { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; }
  .card .card-ico {
    flex-shrink: 0; width: 30px; height: 30px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--seafoam-pale); color: var(--teal);
  }
  .card .card-ico svg { width: 17px; height: 17px; }
  .card h3 { margin: 0; font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
  .card .body { color: var(--ink); font-size: 15px; flex: 1; min-height: 0; }

  /* accent rail by tone */
  .card.tone-good   .card-ico { background: var(--seafoam-pale); color: var(--teal); }
  .card.tone-warning .card-ico { background: #f6ecd8; color: var(--gold); }

  .card.size-large   { grid-column: span 2; grid-row: span 2; }
  .card.size-medium  { grid-column: span 2; grid-row: span 1; }
  .card.size-small   { grid-column: span 1; grid-row: span 1; }
  .card.size-large h3 { font-size: 17px; }

  /* progress */
  .card .progress-track {
    height: 8px; background: #e9f1ee; border-radius: 999px;
    margin-top: 13px; overflow: hidden;
  }
  .card .progress-fill { height: 100%; width: 0; background: var(--teal); border-radius: 999px; }
  .card .progress-pct { font-size: 14px; color: var(--muted); margin-top: 7px; font-weight: 600; }
  .card.tone-good .progress-fill    { background: var(--teal); }
  .card.tone-warning .progress-fill { background: var(--gold); }
  .card.tone-neutral .progress-fill { background: var(--teal-soft); }

  /* lists */
  .card ul.dates, .card ul.checklist { list-style: none; padding: 0; margin: 0; }
  .card ul.dates li {
    padding: 7px 0 7px 16px; position: relative; border-bottom: 1px solid var(--line); font-size: 15px;
  }
  .card ul.dates li::before {
    content: ""; position: absolute; left: 0; top: 13px;
    width: 7px; height: 7px; border-radius: 50%; background: var(--teal); opacity: .8;
  }
  .card ul.dates li:last-child { border-bottom: none; }
  .card ul.checklist li {
    padding: 5px 0; font-size: 15px; display: flex; gap: 9px; align-items: flex-start; line-height: 1.45;
  }
  .card ul.checklist li .box {
    flex-shrink: 0; width: 16px; height: 16px; border-radius: 5px; margin-top: 1px;
    border: 1.5px solid var(--teal-soft); display: inline-flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .card ul.checklist li.done .box { background: var(--teal); border-color: var(--teal); }
  .card ul.checklist li.done .box svg { width: 11px; height: 11px; }
  .card ul.checklist li.done { color: var(--muted); }
  .card ul.checklist li.done .txt { text-decoration: line-through; }

  .card .unknown-type { display: inline-block; font-size: 13px; color: var(--muted); margin-top: 6px; font-style: italic; }

  /* files tree */
  .card ul.files-tree, .card ul.files-tree ul { list-style: none; padding-left: 14px; margin: 0; }
  .card ul.files-tree { padding-left: 0; }
  .card ul.files-tree li { padding: 3px 0; font-size: 15px; }
  .card ul.files-tree li.folder > .label { font-weight: 700; }
  .card ul.files-tree li .label::before { display: inline-block; width: 15px; margin-right: 3px; }
  .card ul.files-tree li.folder > .label::before { content: "▸"; color: var(--teal); }
  .card ul.files-tree li.file   > .label::before { content: "·"; color: var(--muted); }
  .card ul.files-tree li.file a { color: var(--teal); text-decoration: none; }
  .card ul.files-tree li.file a:hover { text-decoration: underline; }
  .card ul.files-tree li.empty { color: var(--muted); font-style: italic; }

  /* ---- motion (teacher-facing; honors reduced-motion) ---- */
  @media (prefers-reduced-motion: no-preference) {
    .hero { animation: heroIn .55s ease both; }
    .card { animation: cardIn .5s ease both; opacity: 0; }
    .card:nth-child(1){animation-delay:.05s}
    .card:nth-child(2){animation-delay:.10s}
    .card:nth-child(3){animation-delay:.15s}
    .card:nth-child(4){animation-delay:.20s}
    .card:nth-child(5){animation-delay:.25s}
    .card:nth-child(6){animation-delay:.30s}
    .card:nth-child(7){animation-delay:.34s}
    .card:nth-child(8){animation-delay:.38s}
    .progress-fill { transition: width 1.1s cubic-bezier(.4,0,.2,1); }
    @keyframes heroIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
    @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  }

  /* ---- responsive ---- */
  @media (max-width: 1023px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .card.size-large  { grid-column: span 2; grid-row: span 2; }
    .card.size-medium { grid-column: span 2; grid-row: span 1; }
    .card.size-small  { grid-column: span 1; grid-row: span 1; }
  }
  @media (max-width: 639px) {
    .main { padding: 16px 14px 36px; }
    .hero { flex-direction: column; align-items: flex-start; padding: 20px; }
    .hero-actions { align-items: flex-start; width: 100%; }
    .hero-hint { text-align: left; }
    .grid { grid-template-columns: 1fr; }
    .card, .card.size-large, .card.size-medium, .card.size-small { grid-column: 1 / -1; grid-row: auto; }
  }

  /* ---- print (sidebar hidden by _nav.js print rule) ---- */
  @media print {
    body { background: white; }
    #error-banner, .hero-actions { display: none; }
    .hero { background: white; color: var(--ink); box-shadow: none; border: 1px solid #ccc; }
    .hero h1, .hero .hero-sub, .hero-eyebrow { color: var(--ink); }
    .main { padding: 12px; }
    .grid { display: block; }
    .card { animation: none; opacity: 1; box-shadow: none; page-break-inside: avoid; margin-bottom: 12px; border: 1px solid #ccc; }
  }
</style>
</head>

<script>
const $ = (id) => document.getElementById(id);
const errors = [];

/* small inline icon set for card headers (decorative) */
const CARD_ICONS = {
  sparkles: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.8 4.7L18.5 9.5 13.8 11.3 12 16l-1.8-4.7L5.5 9.5l4.7-1.8z"/><path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8z"/></svg>',
  book:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
  target:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>',
  flag:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21V4"/><path d="M5 4h11l-1.5 3.5L16 11H5"/></svg>',
  calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg>',
  folder:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2.5h8a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
  check:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
};
const CHECK_MARK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

function iconFor(card) {
  const id = (card.id || '').toLowerCase();
  if (id.includes('start-here')) return 'sparkles';
  if (id.includes('goal'))       return 'flag';
  if (id.includes('focus'))      return 'target';
  if (id.includes('unit'))       return 'book';
  if (id.includes('upcoming'))   return 'calendar';
  if (id.includes('artifact') || id.includes('generated') || id.includes('made')) return 'folder';
  switch (card.type) {
    case 'progress':  return 'book';
    case 'dates':     return 'calendar';
    case 'checklist': return 'check';
    case 'files':     return 'folder';
    default:          return 'target';
  }
}

function showErrors() {
  const banner = $('error-banner');
  banner.textContent = errors.length ? errors.join(' · ') : '';
}

function loadInlineJSON(id) {
  try {
    const el = document.getElementById(id);
    if (!el) throw new Error(`#${id} block not found`);
    return JSON.parse(el.textContent);
  } catch (err) {
    errors.push(`Couldn't read #${id} — ${err.message}`);
    showErrors();
    return null;
  }
}

/* pull a tier snapshot ("12 strong · 8 steady · 4 struggling") out of a card,
   purely for the hero chips. Aggregate counts only — never per-student. */
function tierChipsFrom(data) {
  if (!data || !Array.isArray(data.cards)) return null;
  for (const c of data.cards) {
    if (typeof c.body !== 'string') continue;
    const m = c.body.match(/(\d+)\s*strong.*?(\d+)\s*steady.*?(\d+)\s*strug/i);
    if (m) return { strong: m[1], steady: m[2], strug: m[3] };
  }
  return null;
}

function renderHero(data, isDemo) {
  $('dash-title').textContent = (data && data.title) || 'Dashboard';
  $('dash-subtitle').textContent = (data && data.subtitle) || '';
  $('hero-eyebrow').textContent = isDemo ? 'Demo class' : 'Your classroom AI';

  const chipsEl = $('hero-chips');
  const chips = isDemo ? tierChipsFrom(data) : null;
  if (chips) {
    chipsEl.innerHTML =
      `<span class="chip"><span class="dot s-strong"></span>${chips.strong} strong</span>` +
      `<span class="chip"><span class="dot s-steady"></span>${chips.steady} steady</span>` +
      `<span class="chip"><span class="dot s-strug"></span>${chips.strug} struggling</span>`;
    chipsEl.hidden = false;
  } else {
    chipsEl.innerHTML = '';
    chipsEl.hidden = true;
  }

  const hint = $('hero-hint');
  hint.textContent = isDemo ? 'You’re viewing fictional data' : 'Watch this page fill with a real class';
}

function renderCards(data) {
  const grid = $('grid');
  grid.innerHTML = '';
  const cards = (data && data.cards) || [];
  if (cards.length === 0) {
    grid.innerHTML = '<div class="empty-state">No dashboard cards yet. Set them up with Claude Cowork.</div>';
    return;
  }
  for (const card of cards) grid.appendChild(renderCard(card));
}

function renderCard(card) {
  const el = document.createElement('div');
  const size = ['large', 'medium', 'small'].includes(card.size) ? card.size : 'small';
  const tone = ['good', 'warning', 'neutral'].includes(card.tone) ? card.tone : 'neutral';
  el.className = `card size-${size} tone-${tone}`;

  const head = document.createElement('div');
  head.className = 'card-head';
  const ico = document.createElement('span');
  ico.className = 'card-ico';
  ico.innerHTML = CARD_ICONS[iconFor(card)] || CARD_ICONS.target;
  head.appendChild(ico);
  const title = document.createElement('h3');
  title.textContent = card.title || '';
  head.appendChild(title);
  el.appendChild(head);

  const body = document.createElement('div');
  body.className = 'body';
  renderCardBody(body, card);
  el.appendChild(body);
  return el;
}

function renderCardBody(container, card) {
  switch (card.type) {
    case 'progress':  return renderProgress(container, card);
    case 'text':      return renderText(container, card);
    case 'dates':     return renderDates(container, card);
    case 'checklist': return renderChecklist(container, card);
    case 'files':     return renderFiles(container, card);
    default:
      container.textContent = card.body ? String(card.body) : '';
      const note = document.createElement('span');
      note.className = 'unknown-type';
      note.textContent = `unknown type: ${card.type || '(missing)'}`;
      container.appendChild(note);
  }
}

function renderProgress(container, card) {
  if (card.body) {
    const p = document.createElement('div');
    p.textContent = String(card.body);
    container.appendChild(p);
  }
  const pct = typeof card.progress === 'number' ? Math.max(0, Math.min(1, card.progress)) : 0;
  const track = document.createElement('div');
  track.className = 'progress-track';
  const fill = document.createElement('div');
  fill.className = 'progress-fill';
  track.appendChild(fill);
  container.appendChild(track);
  if (typeof card.progress === 'number') {
    const lbl = document.createElement('div');
    lbl.className = 'progress-pct';
    lbl.textContent = `${Math.round(pct * 100)}% there`;
    container.appendChild(lbl);
  }
  // animate width in after paint
  requestAnimationFrame(() => requestAnimationFrame(() => { fill.style.width = `${pct * 100}%`; }));
}

function renderText(container, card) {
  container.textContent = card.body ? String(card.body) : '';
}

function renderDates(container, card) {
  const items = Array.isArray(card.body) ? card.body : [];
  const ul = document.createElement('ul');
  ul.className = 'dates';
  for (const item of items) {
    const li = document.createElement('li');
    li.textContent = String(item);
    ul.appendChild(li);
  }
  container.appendChild(ul);
}

function renderChecklist(container, card) {
  const items = Array.isArray(card.body) ? card.body : [];
  const ul = document.createElement('ul');
  ul.className = 'checklist';
  for (const item of items) {
    const li = document.createElement('li');
    if (item && item.done) li.classList.add('done');
    const box = document.createElement('span');
    box.className = 'box';
    if (item && item.done) box.innerHTML = CHECK_MARK;
    li.appendChild(box);
    const txt = document.createElement('span');
    txt.className = 'txt';
    txt.textContent = (item && item.text) || '';
    li.appendChild(txt);
    ul.appendChild(li);
  }
  container.appendChild(ul);
}

function renderFiles(container, card) {
  const items = Array.isArray(card.body) ? card.body : [];
  if (items.length === 0) {
    container.innerHTML = '<span class="unknown-type">No files yet</span>';
    return;
  }
  const ul = document.createElement('ul');
  ul.className = 'files-tree';
  for (const node of items) ul.appendChild(renderFileNode(node));
  container.appendChild(ul);
}

function renderFileNode(node) {
  const li = document.createElement('li');
  const label = document.createElement('span');
  label.className = 'label';
  if (node && node.type === 'folder') {
    li.classList.add('folder');
    label.textContent = ' ' + (node.name || 'Untitled folder');
    li.appendChild(label);
    const children = Array.isArray(node.children) ? node.children : [];
    if (children.length === 0) {
      const empty = document.createElement('ul');
      const emptyLi = document.createElement('li');
      emptyLi.className = 'empty';
      emptyLi.textContent = '(empty)';
      empty.appendChild(emptyLi);
      li.appendChild(empty);
    } else {
      const sub = document.createElement('ul');
      for (const child of children) sub.appendChild(renderFileNode(child));
      li.appendChild(sub);
    }
  } else {
    li.classList.add('file');
    if (node && node.href) {
      const a = document.createElement('a');
      a.href = node.href;
      a.textContent = ' ' + (node.name || node.href);
      label.appendChild(a);
    } else {
      label.textContent = ' ' + ((node && node.name) || 'Untitled');
    }
    li.appendChild(label);
  }
  return li;
}

function init() {
  const data = loadInlineJSON('dashboard-data');
  renderHero(data, false);
  renderCards(data);

  // Demo class toggle — swaps in the fictional class at runtime. Nothing is saved.
  const btn = $('btn-demo');
  let demoOn = false;
  btn.addEventListener('click', () => {
    demoOn = !demoOn;
    const d = demoOn ? loadInlineJSON('dashboard-demo-data') : data;
    renderHero(d, demoOn);
    renderCards(d);
    btn.textContent = demoOn ? 'Exit demo' : 'See a demo class';
    btn.classList.toggle('is-on', demoOn);
  });
}

init();
</script>
</body>
</html>
